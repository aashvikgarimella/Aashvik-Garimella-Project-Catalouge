name: Lynx
options:
  bundleIdPrefix: com.garimella
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Lynx:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: App/Info.generated.plist
      properties:
        CFBundleDisplayName: lynx
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStylex: Automatic
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: lynx attaches photos you pick to your notes.
        NSCameraUsageDescription: lynx attaches photos you take to your notes.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.garimella.lynx
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: "AltBeigeRed AltBeigeAmber AltBeigeGreen AltBeigeBlue AltBeigePurple AltBeigePink AltBeigeInk AltLightOrange AltLightRed AltLightAmber AltLightGreen AltLightBlue AltLightPurple AltLightPink AltLightInk AltDarkOrange AltDarkRed AltDarkAmber AltDarkGreen AltDarkBlue AltDarkPurple AltDarkPink AltDarkInk"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8G3CG952RL"
