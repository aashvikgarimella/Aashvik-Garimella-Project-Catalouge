<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideoLens</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='38' fill='%23E5484D'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F6F8;
    --ink: #1C232B;
    --ink-soft: #5A6572;
    --mist: #DDE3EA;
    --strip: #23282E;
    --rec: #E5484D;
    --ok: #30A46C;
    --card: #FFFFFF;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --body: "Instrument Sans", system-ui, sans-serif;
    --display: "Bricolage Grotesque", var(--body);
  }
  * { box-sizing: border-box; margin: 0; }
  html { color-scheme: light; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 40px 20px 96px; }

  /* ---------- header ---------- */
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 36px; }
  .wordmark { font-family: var(--display); font-weight: 800; font-size: 28px; letter-spacing: -0.02em; }
  .wordmark .dot { color: var(--rec); }
  .tagline { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }
  @media (max-width: 560px) { .tagline { display: none; } }

  /* ---------- filmstrip dropzone (signature) ---------- */
  .strip {
    position: relative;
    background: var(--strip);
    border-radius: 10px;
    padding: 22px 0;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
    outline: none;
  }
  .strip:focus-visible { box-shadow: 0 0 0 3px var(--bg), 0 0 0 6px var(--ink); }
  .strip.dragover { transform: scale(1.01); box-shadow: 0 12px 32px rgba(28,35,43,.28); }
  /* sprocket holes */
  .strip::before, .strip::after {
    content: "";
    position: absolute; left: 0; right: 0; height: 12px;
    background-image: radial-gradient(circle at 50% 50%, var(--bg) 0 4px, transparent 4.5px);
    background-size: 26px 12px;
    background-position: 13px 0;
  }
  .strip::before { top: 6px; }
  .strip::after { bottom: 6px; }
  .strip-inner {
    margin: 14px 14px;
    border: 1px dashed rgba(244,246,248,.35);
    border-radius: 4px;
    padding: 34px 24px;
    text-align: center;
    color: #E8EDF2;
  }
  .strip-inner h2 { font-family: var(--display); font-weight: 700; font-size: 21px; letter-spacing: -0.01em; }
  .strip-inner p { color: #99A5B1; font-size: 14px; margin-top: 6px; }
  .strip-inner .file-meta { font-family: var(--mono); font-size: 13px; color: #E8EDF2; margin-top: 6px; word-break: break-all; }
  .strip-inner .file-meta .tc { color: var(--rec); }
  input[type="file"] { display: none; }

  /* ---------- controls ---------- */
  .controls { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: end; margin-top: 26px; }
  @media (max-width: 560px) { .controls { grid-template-columns: 1fr; } }
  .field-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px; text-transform: uppercase; letter-spacing: .12em;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .modes { display: inline-flex; background: var(--card); border: 1px solid var(--mist); border-radius: 8px; padding: 3px; }
  .modes button {
    appearance: none; border: 0; background: transparent;
    font: 600 14px var(--body); color: var(--ink-soft);
    padding: 8px 16px; border-radius: 6px; cursor: pointer;
  }
  .modes button:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }
  .modes button.active { background: var(--ink); color: #fff; }
  select {
    font: 500 14px var(--body); color: var(--ink);
    background: var(--card); border: 1px solid var(--mist); border-radius: 8px;
    padding: 10px 12px; min-width: 210px; cursor: pointer;
  }
  select:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }
  .prov-note { font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft); margin-top: 7px; }
  .prov-note .on { color: var(--ok); }
  .prov-note .off { color: var(--rec); }

  #questions-field { display: none; margin-top: 20px; }
  #questions-field.show { display: block; }
  textarea {
    width: 100%; min-height: 110px; resize: vertical;
    font: 400 15px/1.5 var(--body); color: var(--ink);
    background: var(--card); border: 1px solid var(--mist); border-radius: 8px;
    padding: 12px 14px;
  }
  textarea:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }

  /* ---------- analyze button / transport ---------- */
  .go-row { display: flex; align-items: center; gap: 16px; margin-top: 24px; }
  #go {
    appearance: none; border: 0; cursor: pointer;
    font: 600 15px var(--body); color: #fff;
    background: var(--ink); border-radius: 8px;
    padding: 13px 28px;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background .15s ease;
  }
  #go:hover:not(:disabled) { background: #2A333D; }
  #go:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  #go:disabled { opacity: .45; cursor: not-allowed; }
  #go .rec-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rec); }
  .timecode { font-family: var(--mono); font-size: 15px; color: var(--ink-soft); display: none; align-items: center; gap: 9px; }
  .timecode.live { display: inline-flex; }
  .timecode .blink { width: 9px; height: 9px; border-radius: 50%; background: var(--rec); animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: .15; } }
  @media (prefers-reduced-motion: reduce) { .timecode .blink { animation: none; } }

  /* ---------- result ---------- */
  #error {
    display: none; margin-top: 24px; padding: 14px 16px;
    background: #FDEBEC; border: 1px solid #F3B8BB; border-radius: 8px;
    color: #8F1D22; font-size: 14.5px;
  }
  #result { display: none; margin-top: 30px; background: var(--card); border: 1px solid var(--mist); border-radius: 10px; }
  .result-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; border-bottom: 1px solid var(--mist);
    font-family: var(--mono); font-size: 12px; color: var(--ink-soft);
  }
  .result-bar button {
    appearance: none; border: 1px solid var(--mist); background: transparent; border-radius: 6px;
    font: 500 12px var(--mono); color: var(--ink-soft); padding: 4px 10px; cursor: pointer;
  }
  .result-bar button:hover { color: var(--ink); border-color: var(--ink-soft); }
  .result-body { padding: 24px 28px 30px; }
  .result-body h1, .result-body h2, .result-body h3 {
    font-family: var(--display); letter-spacing: -0.01em; margin: 22px 0 10px;
  }
  .result-body h1 { font-size: 26px; font-weight: 800; }
  .result-body h2 { font-size: 20px; font-weight: 700; }
  .result-body h3 { font-size: 17px; font-weight: 700; }
  .result-body h1:first-child, .result-body h2:first-child, .result-body h3:first-child { margin-top: 0; }
  .result-body p { margin: 10px 0; }
  .result-body ul, .result-body ol { margin: 10px 0 10px 24px; }
  .result-body li { margin: 5px 0; }
  .result-body code { font-family: var(--mono); font-size: .9em; background: var(--bg); padding: 1px 5px; border-radius: 4px; }
  .result-body strong { font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="wordmark">Video<span class="dot">●</span>Lens</div>
    <div class="tagline">drop video → pick a job → read the answer</div>
  </header>

  <div class="strip" id="drop" role="button" tabindex="0" aria-label="Choose a video file">
    <div class="strip-inner" id="drop-inner">
      <h2>Drop a video here</h2>
      <p>or click to browse · mp4, mov, webm · up to 500 MB</p>
    </div>
  </div>
  <input type="file" id="file" accept="video/*,.mkv,.m4v">

  <div class="controls">
    <div>
      <label class="field-label">What do you want from it?</label>
      <div class="modes" role="tablist">
        <button type="button" class="active" data-mode="summarize">Summarize</button>
        <button type="button" data-mode="questions">Answer questions</button>
        <button type="button" data-mode="recipe">Extract recipe</button>
      </div>
    </div>
    <div>
      <label class="field-label" for="provider">Model</label>
      <select id="provider"></select>
      <div class="prov-note" id="prov-note"></div>
    </div>
  </div>

  <div id="questions-field">
    <label class="field-label" for="questions">Your questions — one per line</label>
    <textarea id="questions" placeholder="What steps did I demonstrate?&#10;Did I miss anything in the checklist?&#10;What was shown at the end?"></textarea>
  </div>

  <div class="go-row">
    <button id="go" disabled><span class="rec-dot"></span>Analyze video</button>
    <span class="timecode" id="timecode"><span class="blink"></span><span id="tc-text">00:00</span> analyzing…</span>
  </div>

  <div id="error"></div>

  <div id="result">
    <div class="result-bar">
      <span id="result-meta"></span>
      <button id="copy">copy</button>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>
</div>

<script>
const drop = document.getElementById("drop");
const dropInner = document.getElementById("drop-inner");
const fileInput = document.getElementById("file");
const providerSel = document.getElementById("provider");
const provNote = document.getElementById("prov-note");
const questionsField = document.getElementById("questions-field");
const questionsBox = document.getElementById("questions");
const go = document.getElementById("go");
const timecode = document.getElementById("timecode");
const tcText = document.getElementById("tc-text");
const errBox = document.getElementById("error");
const resultBox = document.getElementById("result");
const resultBody = document.getElementById("result-body");
const resultMeta = document.getElementById("result-meta");

let mode = "summarize";
let currentFile = null;
let providers = [];
let timer = null;

// ---- providers ----
fetch("/api/providers").then(r => r.json()).then(list => {
  providers = list;
  providerSel.innerHTML = "";
  for (const p of list) {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name + (p.available ? "" : " — no key");
    providerSel.appendChild(opt);
  }
  const firstAvailable = list.find(p => p.available);
  if (firstAvailable) providerSel.value = firstAvailable.id;
  updateProvNote();
});
providerSel.addEventListener("change", updateProvNote);
function updateProvNote() {
  const p = providers.find(x => x.id === providerSel.value);
  if (!p) return;
  provNote.innerHTML = p.available
    ? `<span class="on">● key found</span> · ${esc(p.method)}`
    : `<span class="off">● no API key</span> — add it to .env and restart`;
  updateGo();
}

// ---- modes ----
document.querySelectorAll(".modes button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".modes button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    questionsField.classList.toggle("show", mode === "questions");
    updateGo();
  });
});
questionsBox.addEventListener("input", updateGo);

// ---- file selection ----
drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
fileInput.addEventListener("change", () => setFile(fileInput.files[0]));
["dragover", "dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("dragover"); }));
["dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("dragover"); }));
drop.addEventListener("drop", e => {
  const f = e.dataTransfer.files && e.dataTransfer.files[0];
  if (f) setFile(f);
});

function setFile(f) {
  if (!f) return;
  currentFile = f;
  const mb = (f.size / 1048576).toFixed(1);
  dropInner.innerHTML = `<h2>Loaded</h2><div class="file-meta">${esc(f.name)} · <span class="tc">${mb} MB</span></div><p>drop another file to replace it</p>`;
  // read duration for the timecode readout
  const url = URL.createObjectURL(f);
  const v = document.createElement("video");
  v.preload = "metadata";
  v.onloadedmetadata = () => {
    const meta = dropInner.querySelector(".file-meta");
    if (meta && isFinite(v.duration)) {
      meta.innerHTML = `${esc(f.name)} · <span class="tc">${fmt(v.duration)}</span> · ${mb} MB`;
    }
    URL.revokeObjectURL(url);
  };
  v.src = url;
  updateGo();
}

function updateGo() {
  const p = providers.find(x => x.id === providerSel.value);
  const needQ = mode === "questions" && !questionsBox.value.trim();
  go.disabled = !currentFile || !p || !p.available || needQ || timer !== null;
}

// ---- analyze ----
go.addEventListener("click", async () => {
  errBox.style.display = "none";
  resultBox.style.display = "none";

  const form = new FormData();
  form.append("file", currentFile);
  form.append("mode", mode);
  form.append("provider", providerSel.value);
  form.append("questions", questionsBox.value);

  const start = Date.now();
  timecode.classList.add("live");
  tcText.textContent = "00:00";
  timer = setInterval(() => { tcText.textContent = fmt((Date.now() - start) / 1000); }, 1000);
  updateGo();

  try {
    const resp = await fetch("/api/analyze", { method: "POST", body: form });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.detail || `Request failed (${resp.status})`);
    resultMeta.textContent = `${data.provider} · ${data.mode} · ${fmt((Date.now() - start) / 1000)}`;
    resultBody.innerHTML = renderMarkdown(data.result);
    resultBox.style.display = "block";
    resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
  } catch (e) {
    errBox.textContent = e.message;
    errBox.style.display = "block";
  } finally {
    clearInterval(timer);
    timer = null;
    timecode.classList.remove("live");
    updateGo();
  }
});

document.getElementById("copy").addEventListener("click", async (e) => {
  await navigator.clipboard.writeText(resultBody.innerText);
  e.target.textContent = "copied";
  setTimeout(() => (e.target.textContent = "copy"), 1500);
});

// ---- helpers ----
function fmt(totalSeconds) {
  const s = Math.floor(totalSeconds);
  const m = Math.floor(s / 60);
  return String(m).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
}
function esc(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
// minimal markdown renderer: headings, bold, italics, inline code, lists, paragraphs
function renderMarkdown(md) {
  const inline = t => esc(t)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|\W)\*([^*\n]+)\*(?=\W|$)/g, "$1<em>$2</em>");
  const lines = md.split("\n");
  let html = "", list = null, para = [];
  const flushPara = () => { if (para.length) { html += `<p>${inline(para.join(" "))}</p>`; para = []; } };
  const flushList = () => { if (list) { html += `</${list}>`; list = null; } };
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, "");
    const h = line.match(/^(#{1,3})\s+(.*)/);
    const ul = line.match(/^\s*[-*]\s+(.*)/);
    const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
    if (h) { flushPara(); flushList(); html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`; }
    else if (ul) { flushPara(); if (list !== "ul") { flushList(); html += "<ul>"; list = "ul"; } html += `<li>${inline(ul[1])}</li>`; }
    else if (ol) { flushPara(); if (list !== "ol") { flushList(); html += "<ol>"; list = "ol"; } html += `<li>${inline(ol[1])}</li>`; }
    else if (!line.trim()) { flushPara(); flushList(); }
    else { flushList(); para.push(line.trim()); }
  }
  flushPara(); flushList();
  return html;
}
</script>
</body>
</html>
